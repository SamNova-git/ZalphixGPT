<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZalphixGPT</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

#chat{
height:60vh;
overflow-y:auto;
border:1px solid #333;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:75%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.user{
color:#60a5fa;
}

.ai{
color:#22c55e;
}
</style>
</head>
<body>

<h1>🤖 ZalphixGPT</h1>

<div id="chat"></div>

<input id="question" placeholder="Ask me anything...">
<button onclick="ask()">Send</button>

<script>

let brain={};

async function loadBrain(){
const r=await fetch("brain.json");
brain=await r.json();
}

loadBrain();

function add(text,cls){

const div=document.createElement("div");

div.className=cls;

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function ask(){

const q=document
.getElementById("question")
.value
.trim()
.toLowerCase();

if(!q)return;

add("You: "+q,"user");

if(brain[q]){

add(
"AI: "+brain[q],
"ai"
);

}else{

const ans=
prompt(
"I don't know that.\nTeach me:"
);

if(ans){

alert(
"Save this answer somewhere for now:\n\n"+
q+
"\n=\n"+
ans
);

}

}

document
.getElementById("question")
.value="";

}

</script>

</body>
</html>
